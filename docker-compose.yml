version: "3.8"
services:
  server:
    build: { context: ., dockerfile: server/Dockerfile }
    ports: ["8080:8080"]
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATABASE_URL=jdbc:postgresql://db:5432/mafia
      - DATABASE_USER=mafia
      - DATABASE_PASSWORD=mafia_secret
    depends_on: [db]
    restart: unless-stopped
  db:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: mafia, POSTGRES_USER: mafia, POSTGRES_PASSWORD: mafia_secret }
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
volumes:
  pgdata:
